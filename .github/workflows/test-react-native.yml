name: Test React Native Library

on:
  push:

env:
  XCODE_VERSION: 16.4

jobs:
  android-build-TestProject:
    name: Android TestProject - Build and Test React Native Library
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install dependencies in TestProject
        run: pnpm install --frozen-lockfile
        working-directory: TestProject

      - name: Build Android
        working-directory: TestProject/android
        run: ./gradlew assembleDebug

      - name: Start Metro Bundler # and Test App
        working-directory: TestProject
        run: |
          pnpm start &
          sleep 10 # Allow Metro Bundler to start

  ios-build-TestProject:
    name: iOS TestProject - Build and Test React Native Library
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install dependencies in TestProject
        run: pnpm install --frozen-lockfile
        working-directory: TestProject

      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install Pods
        working-directory: TestProject/ios
        run: |
          # CocoaPods can intermittently fail while resolving pnpm symlinks.
          if ! pod install; then
            rm -rf Pods
            pod install
          fi

      - name: Build iOS
        working-directory: TestProject/ios
        env:
          CI: true
        run: xcodebuild -workspace TestProject.xcworkspace -scheme TestProject -sdk iphonesimulator -configuration Debug build

      - name: Start Metro Bundler # and Test App
        working-directory: TestProject
        run: |
          pnpm start &
          sleep 10 # Allow Metro Bundler to start
