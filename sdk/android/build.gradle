plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

def isNewArchitectureEnabled() {
    return project.hasProperty("newArchEnabled") && project.getProperty("newArchEnabled") == "true"
}

// On the New Architecture the React Gradle plugin runs Codegen for this library, generating the
// `NativeRNFingerprintjsProSpec` base class from `src/specs/NativeRNFingerprintjsPro.ts`.
if (isNewArchitectureEnabled()) {
    apply plugin: 'com.facebook.react'
}

apply from: 'fingerprint.gradle'

android {
    namespace "com.fingerprintjs.reactnative"

    compileSdk 34

    defaultConfig {
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig = true
    }

    lint {
        abortOnError = false
    }

    sourceSets {
        main {
            if (isNewArchitectureEnabled()) {
                java.srcDirs += [
                    'src/newarch',
                    // Generated Codegen sources (the `NativeRNFingerprintjsProSpec` base class).
                    layout.buildDirectory.dir('generated/source/codegen/java').get().asFile.path
                ]
            } else {
                java.srcDirs += ['src/oldarch']
            }
        }
    }
}

repositories {
    mavenCentral()
    google()
    maven { url 'https://maven.fpregistry.io/releases' }
    maven { url 'https://jitpack.io' }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
    implementation "com.fingerprint.android:pro:$fingerprint_native_sdk_version"
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
}
